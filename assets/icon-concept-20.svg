<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 20: Fork with arrow tips — dots at endpoints instead of bare lines -->
  <rect width="512" height="512" rx="112" fill="#0f0b2e"/>

  <!-- Vertical input -->
  <path d="M152 80 L152 432" stroke="#4338ca" stroke-width="36" stroke-linecap="round"/>

  <!-- Horizontal to junction -->
  <path d="M152 256 L304 256" stroke="#818cf8" stroke-width="36" stroke-linecap="round"/>

  <!-- Up branch -->
  <path d="M304 256 L304 120" stroke="#a5b4fc" stroke-width="36" stroke-linecap="round"/>

  <!-- Right branch -->
  <path d="M304 256 L420 256" stroke="#a5b4fc" stroke-width="36" stroke-linecap="round"/>

  <!-- Down branch -->
  <path d="M304 256 L304 392" stroke="#a5b4fc" stroke-width="36" stroke-linecap="round"/>

  <!-- Endpoint dots -->
  <circle cx="304" cy="108" r="24" fill="#c7d2fe"/>
  <circle cx="420" cy="256" r="24" fill="#c7d2fe"/>
  <circle cx="304" cy="404" r="24" fill="#c7d2fe"/>
</svg>
