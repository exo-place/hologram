<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 7: Orb with ring — bold circle + thick orbital arc, flat colors -->
  <rect width="512" height="512" rx="112" fill="#0f0b2e"/>

  <!-- Orbital ring (thick, behind orb) -->
  <ellipse cx="256" cy="256" rx="180" ry="56"
           fill="none" stroke="#6366f1" stroke-width="24" stroke-linecap="round"
           transform="rotate(-20,256,256)"
           stroke-dasharray="280 400" stroke-dashoffset="60"/>

  <!-- Core orb -->
  <circle cx="256" cy="256" r="88" fill="#818cf8"/>

  <!-- Orbital ring front arc (over orb) -->
  <ellipse cx="256" cy="256" rx="180" ry="56"
           fill="none" stroke="#a5b4fc" stroke-width="24" stroke-linecap="round"
           transform="rotate(-20,256,256)"
           stroke-dasharray="160 520" stroke-dashoffset="-260"/>
</svg>
