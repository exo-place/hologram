<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="512" height="512">
  <!-- Variant: heavier wall, thinner beam, wider spread -->
  <rect width="32" height="32" rx="6" fill="#1a1a1a"/>

  <!-- Wall (heavier) -->
  <rect x="2" y="2" width="8" height="28" rx="2" fill="#888"/>

  <!-- Beam group -->
  <g opacity="0.5" fill="#aaa">
    <!-- Horizontal -->
    <rect x="10" y="14.5" width="14" height="3" rx="0.5"/>

    <!-- Up bar -->
    <rect x="19.5" y="6" width="3" height="10" rx="0.5"/>

    <!-- Down bar -->
    <rect x="19.5" y="16" width="3" height="10" rx="0.5"/>

    <!-- Arrowhead up -->
    <polygon points="17,7.5 21,3 25,7.5"/>

    <!-- Arrowhead right -->
    <polygon points="23,12 28,16 23,20"/>

    <!-- Arrowhead down -->
    <polygon points="17,24.5 21,29 25,24.5"/>
  </g>
</svg>
