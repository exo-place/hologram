<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 5: Abstract entity — a glowing orb with orbiting fact fragments -->
  <defs>
    <radialGradient id="orb" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="40%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#312e81"/>
    </radialGradient>
    <radialGradient id="aura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#6366f1" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow5s">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="240" fill="#0c0a1d"/>

  <!-- Aura -->
  <circle cx="256" cy="256" r="200" fill="url(#aura)"/>

  <!-- Orbital ring -->
  <ellipse cx="256" cy="256" rx="170" ry="50"
           fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.25"
           transform="rotate(-25,256,256)"/>

  <!-- Core orb -->
  <g filter="url(#glow5)">
    <circle cx="256" cy="256" r="72" fill="url(#orb)"/>
  </g>

  <!-- Specular highlight -->
  <ellipse cx="240" cy="235" rx="30" ry="18" fill="#fff" opacity="0.15"/>

  <!-- Orbiting fragments (facts) -->
  <g filter="url(#glow5s)">
    <!-- Fragment 1 — top-right of orbit -->
    <rect x="388" y="196" width="32" height="8" rx="4" fill="#22d3ee" opacity="0.8"
          transform="rotate(-25,404,200)"/>
    <!-- Fragment 2 — bottom-left -->
    <rect x="92" y="298" width="24" height="8" rx="4" fill="#f472b6" opacity="0.7"
          transform="rotate(-25,104,302)"/>
    <!-- Fragment 3 — top arc -->
    <rect x="200" y="178" width="18" height="6" rx="3" fill="#a78bfa" opacity="0.6"
          transform="rotate(-25,209,181)"/>
    <!-- Fragment 4 — bottom arc -->
    <rect x="310" y="318" width="26" height="7" rx="3.5" fill="#34d399" opacity="0.7"
          transform="rotate(-25,323,321)"/>
  </g>
</svg>
