<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="512" height="512">
  <!-- Same concept, more rotation, arms overlap more -->
  <rect width="32" height="32" rx="6" fill="#1a1a1a"/>

  <!-- Left T (⊢) — darker -->
  <g opacity="0.65" transform="rotate(6,9,16)">
    <rect x="3" y="2" width="7" height="28" rx="3.5" fill="#999"/>
    <rect x="6" y="11" width="15" height="7" rx="3.5" fill="#999"/>
  </g>

  <!-- Right T (⊣) — lighter -->
  <g opacity="0.65" transform="rotate(-6,23,16)">
    <rect x="22" y="2" width="7" height="28" rx="3.5" fill="#ccc"/>
    <rect x="11" y="11" width="15" height="7" rx="3.5" fill="#ccc"/>
  </g>
</svg>
