<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="512" height="512">
  <!-- Two T-shapes (⊢ + ⊣) overlapping to form H, translucent -->
  <rect width="32" height="32" rx="6" fill="#1a1a1a"/>

  <!-- Left T (⊢) — darker, slight lean right -->
  <g opacity="0.7" transform="rotate(3,10,16)">
    <!-- Pillar -->
    <rect x="4" y="3" width="6" height="26" rx="3" fill="#999"/>
    <!-- Arm extending right -->
    <rect x="7" y="12" width="14" height="6" rx="3" fill="#999"/>
  </g>

  <!-- Right T (⊣) — lighter, slight lean left -->
  <g opacity="0.7" transform="rotate(-3,22,16)">
    <!-- Pillar -->
    <rect x="22" y="3" width="6" height="26" rx="3" fill="#ccc"/>
    <!-- Arm extending left -->
    <rect x="11" y="12" width="14" height="6" rx="3" fill="#ccc"/>
  </g>
</svg>
