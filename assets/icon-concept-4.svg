<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 4: Concentric rotating hexagons — holographic interference pattern -->
  <defs>
    <linearGradient id="hex1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="hex2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="hex3" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0c0a1d"/>

  <g transform="translate(256,256)" filter="url(#glow4)">
    <!-- Outer hexagon, rotated 15deg -->
    <polygon points="0,-180 156,-90 156,90 0,180 -156,90 -156,-90"
             fill="none" stroke="url(#hex1)" stroke-width="3" opacity="0.5"
             transform="rotate(15)"/>

    <!-- Middle hexagon, rotated -10deg -->
    <polygon points="0,-130 113,-65 113,65 0,130 -113,65 -113,-65"
             fill="none" stroke="url(#hex2)" stroke-width="3" opacity="0.65"
             transform="rotate(-10)"/>

    <!-- Inner hexagon, rotated 5deg -->
    <polygon points="0,-80 69,-40 69,40 0,80 -69,40 -69,-40"
             fill="url(#hex3)" fill-opacity="0.15" stroke="url(#hex3)" stroke-width="3" opacity="0.8"
             transform="rotate(5)"/>

    <!-- Center dot -->
    <circle r="12" fill="#e0e7ff" opacity="0.9"/>
    <circle r="6" fill="#fff"/>

    <!-- Radiating lines from center to outer vertices -->
    <g stroke="#a5b4fc" stroke-width="0.8" opacity="0.2">
      <line x1="0" y1="0" x2="0" y2="-180" transform="rotate(15)"/>
      <line x1="0" y1="0" x2="0" y2="-180" transform="rotate(75)"/>
      <line x1="0" y1="0" x2="0" y2="-180" transform="rotate(135)"/>
      <line x1="0" y1="0" x2="0" y2="-180" transform="rotate(195)"/>
      <line x1="0" y1="0" x2="0" y2="-180" transform="rotate(255)"/>
      <line x1="0" y1="0" x2="0" y2="-180" transform="rotate(315)"/>
    </g>
  </g>
</svg>
