<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="512" height="512">
  <!-- Isometric H — chunky, rounded, semi-transparent -->
  <rect width="32" height="32" rx="6" fill="#1a1a1a"/>

  <g opacity="0.75">
    <!-- Front face -->
    <path d="
      M7,7  L11,7  L11,13.5  L19,13.5  L19,7  L23,7
      L23,26 L19,26 L19,19.5 L11,19.5 L11,26 L7,26 Z
    " fill="#888" rx="1"/>

    <!-- Top faces -->
    <polygon points="7,7 11,7 14,5 10,5" fill="#aaa"/>
    <polygon points="19,7 23,7 26,5 22,5" fill="#aaa"/>
    <polygon points="11,13.5 19,13.5 22,11.5 14,11.5" fill="#aaa"/>

    <!-- Right faces -->
    <polygon points="23,7 26,5 26,24 23,26" fill="#666"/>
    <polygon points="19,13.5 22,11.5 22,17.5 19,19.5" fill="#666"/>
  </g>
</svg>
