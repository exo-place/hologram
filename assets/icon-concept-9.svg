<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 9: Three stacked rounded bars — abstract holographic layers, super simple -->
  <rect width="512" height="512" rx="112" fill="#0f0b2e"/>

  <!-- Top bar (narrow) -->
  <rect x="176" y="132" width="160" height="40" rx="20" fill="#a5b4fc"/>

  <!-- Middle bar (wide) -->
  <rect x="128" y="236" width="256" height="40" rx="20" fill="#818cf8"/>

  <!-- Bottom bar (medium) -->
  <rect x="152" y="340" width="208" height="40" rx="20" fill="#6366f1"/>
</svg>
