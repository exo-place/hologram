<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="512" height="512">
  <!-- Filled V crossbar variant — the dip area is a filled shape -->
  <rect width="32" height="32" rx="6" fill="#1a1a1a"/>

  <!-- Left wall -->
  <rect x="3" y="3" width="5" height="26" rx="1" fill="#888"/>

  <!-- Right wall -->
  <rect x="24" y="3" width="5" height="26" rx="1" fill="#888"/>

  <!-- Filled V shape connecting walls -->
  <g opacity="0.55">
    <path d="M8,10 Q12,16 16,18 Q20,16 24,10 L24,14 Q20,20 16,22 Q12,20 8,14 Z"
          fill="#bbb"/>
  </g>
</svg>
