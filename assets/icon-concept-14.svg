<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 14: Single trunk splitting into three branches — diverging from one source -->
  <rect width="512" height="512" rx="112" fill="#0f0b2e"/>

  <!-- Trunk -->
  <rect x="228" y="300" width="56" height="120" rx="28" fill="#4338ca"/>

  <!-- Left branch -->
  <path d="M256 300 Q256 240 172 160" fill="none" stroke="#6366f1" stroke-width="40" stroke-linecap="round"/>

  <!-- Center branch -->
  <path d="M256 300 Q256 240 256 140" fill="none" stroke="#a5b4fc" stroke-width="40" stroke-linecap="round"/>

  <!-- Right branch -->
  <path d="M256 300 Q256 240 340 160" fill="none" stroke="#818cf8" stroke-width="40" stroke-linecap="round"/>
</svg>
