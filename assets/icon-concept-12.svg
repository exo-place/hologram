<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 12: Three figures sharing one circle — silhouettes in a shared world -->
  <rect width="512" height="512" rx="112" fill="#0f0b2e"/>

  <!-- Shared world circle -->
  <circle cx="256" cy="256" r="176" fill="#1e1b4b"/>

  <!-- Left figure — rounded pill -->
  <rect x="132" y="192" width="52" height="80" rx="26" fill="#6366f1"/>
  <circle cx="158" cy="168" r="28" fill="#6366f1"/>

  <!-- Center figure -->
  <rect x="230" y="160" width="52" height="80" rx="26" fill="#a5b4fc"/>
  <circle cx="256" cy="136" r="28" fill="#a5b4fc"/>

  <!-- Right figure -->
  <rect x="328" y="192" width="52" height="80" rx="26" fill="#818cf8"/>
  <circle cx="354" cy="168" r="28" fill="#818cf8"/>

  <!-- Shared ground line -->
  <rect x="112" y="308" width="288" height="24" rx="12" fill="#4338ca"/>
</svg>
