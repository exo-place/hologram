<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="512" height="512">
  <!-- Thinner variant, 5deg, slight gap between arms -->
  <rect width="32" height="32" rx="6" fill="#1a1a1a"/>

  <!-- Left T (⊢) -->
  <g opacity="0.7" transform="rotate(5,9,16)">
    <rect x="3" y="3" width="7" height="26" rx="3.5" fill="#999"/>
    <rect x="6" y="12" width="9" height="6" rx="3" fill="#999"/>
  </g>

  <!-- Right T (⊣) -->
  <g opacity="0.7" transform="rotate(-5,23,16)">
    <rect x="22" y="3" width="7" height="26" rx="3.5" fill="#ccc"/>
    <rect x="17" y="12" width="9" height="6" rx="3" fill="#ccc"/>
  </g>
</svg>
