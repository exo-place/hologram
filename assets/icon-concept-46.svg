<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="512" height="512">
  <!-- Scale 2.5x from 8x8, inset to account for stroke-width 2.5 (1.25 per side) -->
  <!-- Left half: (6,5) → pillar down → base angle → arm → tip at (16,20)/(16,15) → back -->
  <!-- Right half: mirrored -->
  <rect width="32" height="32" rx="6" fill="#1a1a1a"/>

  <!-- Left T (⊢) -->
  <path d="M 6 5 l 0 17.5 l 5 2.5 l 0 -7.5 l 5 2.5 l 0 -5 l -5 -2.5 l 0 -5 l -5 -2.5 Z"
        fill="#999" opacity="0.75"
        stroke="#999" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Right T (⊣) -->
  <path d="M 26 5 l 0 17.5 l -5 2.5 l 0 -7.5 l -5 2.5 l 0 -5 l 5 -2.5 l 0 -5 l 5 -2.5 Z"
        fill="#ccc" opacity="0.75"
        stroke="#ccc" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
