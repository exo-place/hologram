<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 13: Overlapping rounded squares — entities as translucent layers sharing space -->
  <rect width="512" height="512" rx="112" fill="#0f0b2e"/>

  <!-- Back entity -->
  <rect x="120" y="120" width="200" height="200" rx="48" fill="#6366f1" opacity="0.7"/>

  <!-- Middle entity -->
  <rect x="172" y="160" width="200" height="200" rx="48" fill="#818cf8" opacity="0.7"/>

  <!-- Front entity -->
  <rect x="216" y="200" width="200" height="200" rx="48" fill="#a5b4fc" opacity="0.7"/>
</svg>
