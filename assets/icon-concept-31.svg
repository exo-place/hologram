<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="512" height="512">
  <!-- Isometric H viewed from the open side — two pillars, crossbar recedes into depth -->
  <!-- The crossbar's inner faces form a V (isometric depth) -->
  <rect width="32" height="32" rx="6" fill="#1a1a1a"/>

  <!-- Left pillar (front face) -->
  <rect x="4" y="4" width="6" height="24" rx="1" fill="#888"/>

  <!-- Right pillar (front face) -->
  <rect x="22" y="4" width="6" height="24" rx="1" fill="#888"/>

  <!-- Crossbar left half — inner face going into depth (back-right) -->
  <polygon points="10,12 16,16 16,20 10,16" fill="#666"/>

  <!-- Crossbar right half — inner face going into depth (back-left) -->
  <polygon points="22,12 16,16 16,20 22,16" fill="#777"/>

  <!-- Crossbar top face (receding into depth) -->
  <polygon points="10,12 22,12 16,16" fill="#999"/>
</svg>
