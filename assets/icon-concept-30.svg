<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="512" height="512">
  <!-- Walls + V with a sharper angle, more like the ASCII art -->
  <rect width="32" height="32" rx="6" fill="#1a1a1a"/>

  <!-- Left wall -->
  <rect x="3" y="3" width="5" height="26" rx="1" fill="#888"/>

  <!-- Right wall -->
  <rect x="24" y="3" width="5" height="26" rx="1" fill="#888"/>

  <!-- Sharp V: horizontal out from wall then diagonal to center -->
  <g opacity="0.55">
    <!-- Left arm: horizontal then diagonal down -->
    <path d="M8,11 L12,11 Q13,11 13.5,12 L16,18" fill="none" stroke="#bbb" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right arm: horizontal then diagonal down -->
    <path d="M24,11 L20,11 Q19,11 18.5,12 L16,18" fill="none" stroke="#bbb" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
