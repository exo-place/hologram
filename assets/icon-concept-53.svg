<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="512" height="512">
  <!-- Arms centered, shorter arms (5h instead of 7), pillars pulled in -->
  <rect width="32" height="32" rx="6" fill="#1a1a1a"/>

  <!-- Left T — arm centered vertically, shorter reach -->
  <path d="M 6 3 l 0 21 l 4 2 l 0 -10 l 5 2.5 l 0 -4 l -5 -2.5 l 0 -7 l -4 -2 Z"
        fill="#999" opacity="0.75"
        stroke="#999" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Right T -->
  <path d="M 26 3 l 0 21 l -4 2 l 0 -10 l -5 2.5 l 0 -4 l 5 -2.5 l 0 -7 l 4 -2 Z"
        fill="#ccc" opacity="0.75"
        stroke="#ccc" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
