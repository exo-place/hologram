<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 11: Rounded diamonds rising from a shared ring — entities projecting from one source -->
  <rect width="512" height="512" rx="112" fill="#0f0b2e"/>

  <!-- Shared ring/substrate -->
  <ellipse cx="256" cy="350" rx="160" ry="40" fill="none" stroke="#4338ca" stroke-width="24" stroke-linecap="round"/>

  <!-- Left entity (shorter) -->
  <rect x="144" y="200" width="56" height="100" rx="28" fill="#6366f1"/>

  <!-- Center entity (tallest) -->
  <rect x="228" y="120" width="56" height="180" rx="28" fill="#a5b4fc"/>

  <!-- Right entity (medium) -->
  <rect x="312" y="168" width="56" height="132" rx="28" fill="#818cf8"/>
</svg>
