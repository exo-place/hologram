<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="512" height="512">
  <!-- Isometric H — wireframe/outline style like Cursor logo -->
  <rect width="32" height="32" rx="6" fill="#1a1a1a"/>

  <!-- Front face outline -->
  <path d="
    M6,7  L10,7  L10,14  L18,14  L18,7  L22,7
    L22,27 L18,27 L18,20 L10,20 L10,27 L6,27 Z
  " fill="none" stroke="#999" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Back face (offset 4,−2) visible edges only -->
  <!-- Top-left to top-right back edge -->
  <line x1="10" y1="5" x2="22" y2="5" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="5" x2="26" y2="5" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Depth connecting lines (front corners to back corners) -->
  <line x1="6" y1="7" x2="10" y2="5" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="7" x2="26" y2="5" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="27" x2="26" y2="25" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Back right edge -->
  <line x1="26" y1="5" x2="26" y2="25" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
</svg>
