<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 16: Beam splitting — one thick line enters bottom, fans into three at top -->
  <rect width="512" height="512" rx="112" fill="#0f0b2e"/>

  <!-- Single input beam -->
  <path d="M256 420 L256 280" stroke="#4338ca" stroke-width="40" stroke-linecap="round"/>

  <!-- Split point glow -->
  <circle cx="256" cy="272" r="32" fill="#6366f1" opacity="0.5"/>

  <!-- Three output beams -->
  <path d="M256 272 L136 108" stroke="#6366f1" stroke-width="28" stroke-linecap="round"/>
  <path d="M256 272 L256 92" stroke="#a5b4fc" stroke-width="28" stroke-linecap="round"/>
  <path d="M256 272 L376 108" stroke="#818cf8" stroke-width="28" stroke-linecap="round"/>
</svg>
