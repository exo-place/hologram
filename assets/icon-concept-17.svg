<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 17: Prism split — a rounded triangle refracting one beam into three -->
  <rect width="512" height="512" rx="112" fill="#0f0b2e"/>

  <!-- Input beam (left side) -->
  <path d="M72 256 L180 256" stroke="#4338ca" stroke-width="28" stroke-linecap="round"/>

  <!-- Prism (rounded triangle) -->
  <path d="M200 160 Q196 148 208 142 L280 100 Q296 92 304 108 L340 320 Q344 336 328 340 L208 340 Q192 340 192 324 Z"
        fill="#1e1b4b" stroke="#6366f1" stroke-width="12" stroke-linejoin="round"/>

  <!-- Three output beams (right side, fanning) -->
  <path d="M340 180 L440 120" stroke="#a5b4fc" stroke-width="24" stroke-linecap="round"/>
  <path d="M348 256 L440 256" stroke="#818cf8" stroke-width="24" stroke-linecap="round"/>
  <path d="M340 320 L440 388" stroke="#6366f1" stroke-width="24" stroke-linecap="round"/>
</svg>
