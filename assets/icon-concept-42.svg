<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="512" height="512">
  <!-- Larger, fills more of the frame, no background rect -->
  <rect width="32" height="32" rx="6" fill="#1a1a1a"/>

  <!-- Left T (⊢) -->
  <g opacity="0.7" fill="#999">
    <!-- Pillar -->
    <polygon points="6,8 10,10 10,26 6,24"/>
    <!-- Arm -->
    <polygon points="6,13 16,18 16,22 6,17"/>
  </g>

  <!-- Right T (⊣) -->
  <g opacity="0.7" fill="#ccc">
    <!-- Pillar -->
    <polygon points="26,8 22,10 22,26 26,24"/>
    <!-- Arm -->
    <polygon points="26,13 16,18 16,22 26,17"/>
  </g>
</svg>
