<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 3: Geometric "H" letterform made of prismatic facets -->
  <defs>
    <linearGradient id="facetL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="facetR" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="facetM" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="240" fill="#0c0a1d"/>

  <g filter="url(#glow3)">
    <!-- Left pillar — two facets -->
    <polygon points="120,100 170,100 170,412 120,412" fill="url(#facetL)"/>
    <polygon points="170,100 195,85 195,397 170,412" fill="#4f46e5" opacity="0.7"/>

    <!-- Right pillar — two facets -->
    <polygon points="317,100 342,85 342,397 317,412" fill="#0e7490" opacity="0.7"/>
    <polygon points="342,100 392,100 392,412 342,412" fill="url(#facetR)"/>

    <!-- Crossbar — angled with facet -->
    <polygon points="170,225 342,210 342,280 170,295" fill="url(#facetM)" opacity="0.85"/>
    <polygon points="170,295 342,280 342,290 170,305" fill="#6d28d9" opacity="0.4"/>

    <!-- Highlight edges -->
    <line x1="120" y1="100" x2="170" y2="100" stroke="#c4b5fd" stroke-width="2" opacity="0.6"/>
    <line x1="342" y1="100" x2="392" y2="100" stroke="#67e8f9" stroke-width="2" opacity="0.6"/>
    <line x1="170" y1="225" x2="342" y2="210" stroke="#ddd6fe" stroke-width="1.5" opacity="0.5"/>
  </g>
</svg>
