<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="512" height="512">
  <!-- Same but chunkier, 3deg lean -->
  <rect width="32" height="32" rx="6" fill="#1a1a1a"/>

  <!-- Left T (⊢) -->
  <g opacity="0.7" transform="rotate(3,9,16)">
    <rect x="2" y="3" width="8" height="26" rx="4" fill="#999"/>
    <rect x="6" y="11" width="10" height="8" rx="4" fill="#999"/>
  </g>

  <!-- Right T (⊣) -->
  <g opacity="0.7" transform="rotate(-3,23,16)">
    <rect x="22" y="3" width="8" height="26" rx="4" fill="#ccc"/>
    <rect x="16" y="11" width="10" height="8" rx="4" fill="#ccc"/>
  </g>
</svg>
