<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="512" height="512">
  <!-- Isometric H: left face ⊢ (darker) + right face ⊣ (lighter), arms meet at front edge -->
  <!-- Left face maps: outer(8,22)→inner(16,26) bottom, outer(8,10)→inner(16,14) top -->
  <!-- Right face maps: outer(24,22)→inner(16,26) bottom, outer(24,10)→inner(16,14) top -->
  <rect width="32" height="32" rx="6" fill="#1a1a1a"/>

  <!-- Left T (⊢) — darker face -->
  <g opacity="0.75" fill="#888">
    <!-- Pillar (outer strip of left face) -->
    <polygon points="8,10 11,11 11,23 8,22"/>
    <!-- Arm (mid-height band, full face width) -->
    <polygon points="8,14 16,18 16,22 8,18"/>
  </g>

  <!-- Right T (⊣) — lighter face -->
  <g opacity="0.75" fill="#bbb">
    <!-- Pillar (outer strip of right face) -->
    <polygon points="24,10 21,11 21,23 24,22"/>
    <!-- Arm (mid-height band, full face width) -->
    <polygon points="24,14 16,18 16,22 24,18"/>
  </g>
</svg>
