<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="512" height="512">
  <!-- Same but wider pillars, thicker arms -->
  <rect width="32" height="32" rx="6" fill="#1a1a1a"/>

  <!-- Left T (⊢) -->
  <g opacity="0.75" fill="#888">
    <!-- Pillar -->
    <polygon points="8,10 12,12 12,24 8,22"/>
    <!-- Arm -->
    <polygon points="8,13 16,17 16,21 8,17"/>
  </g>

  <!-- Right T (⊣) -->
  <g opacity="0.75" fill="#bbb">
    <!-- Pillar -->
    <polygon points="24,10 20,12 20,24 24,22"/>
    <!-- Arm -->
    <polygon points="24,13 16,17 16,21 24,17"/>
  </g>
</svg>
