<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="512" height="512">
  <!-- Chunkier version, less rotation, rounder -->
  <rect width="32" height="32" rx="6" fill="#1a1a1a"/>

  <!-- Left T (⊢) -->
  <g opacity="0.7" transform="rotate(4,10,16)">
    <rect x="3" y="3" width="8" height="26" rx="4" fill="#999"/>
    <rect x="7" y="11" width="13" height="8" rx="4" fill="#999"/>
  </g>

  <!-- Right T (⊣) -->
  <g opacity="0.7" transform="rotate(-4,22,16)">
    <rect x="21" y="3" width="8" height="26" rx="4" fill="#ccc"/>
    <rect x="12" y="11" width="13" height="8" rx="4" fill="#ccc"/>
  </g>
</svg>
