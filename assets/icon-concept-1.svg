<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 1: Holographic projection — a base emitter with a floating diamond shape above it -->
  <defs>
    <linearGradient id="beam" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="crystal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0f0b2e"/>

  <!-- Projection beam (trapezoid) -->
  <polygon points="210,380 302,380 370,180 142,180" fill="url(#beam)" opacity="0.5"/>

  <!-- Floating diamond -->
  <g filter="url(#glow)">
    <polygon points="256,100 330,190 256,280 182,190" fill="url(#crystal)" opacity="0.9"/>
    <!-- Inner facet lines -->
    <line x1="256" y1="100" x2="256" y2="280" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
    <line x1="182" y1="190" x2="330" y2="190" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Emitter base -->
  <ellipse cx="256" cy="390" rx="80" ry="18" fill="url(#base)" opacity="0.9"/>
  <ellipse cx="256" cy="385" rx="60" ry="10" fill="#6366f1" opacity="0.6"/>
</svg>
