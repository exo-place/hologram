<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 18: Pipe fork — vertical line, horizontal branch, splits up/right/down -->
  <rect width="512" height="512" rx="112" fill="#0f0b2e"/>

  <!-- Vertical input (left) -->
  <path d="M152 80 L152 432" stroke="#4338ca" stroke-width="40" stroke-linecap="round"/>

  <!-- Horizontal to junction -->
  <path d="M152 256 L320 256" stroke="#818cf8" stroke-width="40" stroke-linecap="round"/>

  <!-- Up branch -->
  <path d="M320 256 L320 108" stroke="#a5b4fc" stroke-width="40" stroke-linecap="round"/>

  <!-- Right branch -->
  <path d="M320 256 L432 256" stroke="#a5b4fc" stroke-width="40" stroke-linecap="round"/>

  <!-- Down branch -->
  <path d="M320 256 L320 404" stroke="#a5b4fc" stroke-width="40" stroke-linecap="round"/>

  <!-- Junction dot -->
  <circle cx="320" cy="256" r="28" fill="#c7d2fe"/>
</svg>
